<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>IV — Conscientia</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      color: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;

      background:
        radial-gradient(
          circle at center,
          #151515 0%,
          #090909 45%,
          #030303 100%
        );
    }

    .screen {
      position: relative;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      text-align: center;
      padding: 40px;

      overflow: hidden;
    }

    /* Large subtle Roman numeral in background */

    .background-number {
      position: absolute;

      font-size: clamp(15rem, 45vw, 40rem);
      font-weight: 300;

      color: rgba(255, 255, 255, 0.018);

      user-select: none;
      pointer-events: none;

      line-height: 1;
    }

    .content {
      position: relative;
      z-index: 2;

      max-width: 850px;

      animation: fadeIn 1.8s ease;
    }

    .chapter-number {
      font-size: 0.85rem;
      letter-spacing: 0.5em;

      opacity: 0.4;

      margin-bottom: 50px;
    }

    .text {
      font-size: clamp(1.1rem, 2vw, 1.5rem);

      font-weight: 300;
      line-height: 1.8;

      letter-spacing: 0.03em;

      opacity: 0.85;
    }

    .author {
      margin-top: 35px;

      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;

      opacity: 0.35;
    }

    .back {
      display: inline-block;

      margin-top: 70px;

      color: #f2f2f2;
      text-decoration: none;

      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;

      opacity: 0.35;

      transition:
        opacity 0.3s ease,
        transform 0.3s ease;
    }

    .back:hover {
      opacity: 1;
      transform: translateX(-3px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <main class="screen">

    <div class="background-number">
      IV
    </div>

    <div class="content">

      <div class="chapter-number">
        IV
      </div>

      <div class="text">
       .
      </div>

      <div class="author">
       ..
      </div>

      <a class="back" href="index.html">
        ← Return
      </a>

    </div>

  </main>

</body>
</html>
