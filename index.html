<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conscientia</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-right: -0.18em;
    }

    .coming-soon {
      margin-top: 25px;
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .links {
      margin-top: 70px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .links a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .links a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <main class="container">

    <h1>Conscientia</h1>

    <p class="coming-soon">
      Coming Soon
    </p>

    <div class="links">

      <a href="https://www.instagram.com/conscientiaband/"
         target="_blank">
        Instagram
      </a>

      <a href="mailto:contact@conscientiaband.com">
        Contact
      </a>

    </div>

  </main>

</body>
</html>
