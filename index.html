<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Conscientia</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-right: -0.18em;
    }

    .coming-soon {
      margin-top: 25px;
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .enter {
      margin-top: 45px;
      display: inline-block;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #f2f2f2;
      padding: 14px 28px;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .enter:hover {
      border-color: rgba(255, 255, 255, 0.8);
    }

    .chapters {
      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(5, 58px);
      gap: 12px;
      justify-content: center;
    }

    .chapters a {
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(255, 255, 255, 0.22);

      color: #f2f2f2;
      text-decoration: none;

      font-size: 0.8rem;
      letter-spacing: 0.05em;

      opacity: 0.5;

      transition:
        opacity 0.3s ease,
        border-color 0.3s ease,
        transform 0.3s ease,
        background 0.3s ease;
    }

    .chapters a:hover {
      opacity: 1;
      border-color: rgba(255, 255, 255, 0.85);
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.03);
    }

    .links {
      margin-top: 60px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .links a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .links a:hover {
      .contact-note {
  margin-top: 18px;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  opacity: 0.35;
  line-height: 1.6;
}
      opacity: 1;
    }

    #status {
      margin-top: 20px;
      font-size: 0.7rem;
      opacity: 0.4;
    }

    @media (max-width: 500px) {
      .chapters {
        grid-template-columns: repeat(5, 48px);
        gap: 8px;
      }

      .chapters a {
        width: 48px;
        height: 48px;
        font-size: 0.72rem;
      }

      .links {
        gap: 18px;
      }
    }
  </style>
</head>

<body>

  <audio id="introAudio" preload="auto" loop>
    <source src="./intro.mp3.wav" type="audio/wav">
  </audio>

  <main class="screen">
    <div>

      <h1>Conscientia</h1>

      <p class="coming-soon">
        Coming Soon
      </p>

      <button class="enter" id="enterButton">
        Enter
      </button>

      <div class="chapters">
        <a href="chapter1.html">I</a>
        <a href="chapter2.html">II</a>
        <a href="chapter3.html">III</a>
        <a href="chapter4.html">IV</a>
        <a href="chapter5.html">V</a>

        <a href="chapter6.html">VI</a>
        <a href="chapter7.html">VII</a>
        <a href="chapter8.html">VIII</a>
        <a href="chapter9.html">IX</a>
        <a href="chapter10.html">X</a>
      </div>

      <div class="links">

        <a
          href="https://www.instagram.com/conscientiaband/"
          target="_blank"
          rel="noopener noreferrer">
          Instagram
        </a>

        <a href="mailto:contact@conscientiaband.com">
          contact@conscientiaband.com
        </a>

      </div>

      <p class="contact-note">
  For any inquiries, feel free to reach out via Instagram for a faster response.
</p>

      <p id="status"></p>

    </div>
  </main>

  <script>
    const button = document.getElementById("enterButton");
    const audio = document.getElementById("introAudio");
    const status = document.getElementById("status");

    button.addEventListener("click", async () => {
      try {
        audio.volume = 0;

        await audio.play();

        button.textContent = "Playing";
        status.textContent = "";

        let volume = 0;

        const fadeIn = setInterval(() => {
          volume += 0.02;

          if (volume >= 0.6) {
            audio.volume = 0.6;
            clearInterval(fadeIn);
          } else {
            audio.volume = volume;
          }
        }, 100);

      } catch (error) {
        console.error(error);
        status.textContent = "Audio could not be loaded.";
      }
    });
  </script>

</body>
</html>
