<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conscientia</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px;
      transition: opacity 1.5s ease;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-right: -0.18em;
    }

    .coming-soon {
      margin-top: 25px;
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .enter {
      margin-top: 50px;
      display: inline-block;
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: #f2f2f2;
      padding: 14px 28px;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .enter:hover {
      border-color: rgba(255,255,255,0.8);
    }

    .links {
      margin-top: 70px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    .links.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .links a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .links a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <audio id="introAudio" loop>
    <source src="intro.mp3" type="audio/mpeg">
  </audio>

  <main class="screen">
    <div>
      <h1>Conscientia</h1>

      <p class="coming-soon">
        Coming Soon
      </p>

      <button class="enter" id="enterButton">
        Enter
      </button>

      <div class="links" id="links">
        <a href="https://www.instagram.com/conscientiaband/" target="_blank">
          Instagram
        </a>

        <a href="mailto:contact@conscientiaband.com">
          Contact
        </a>
      </div>
    </div>
  </main>

  <script>
    const enterButton = document.getElementById("enterButton");
    const introAudio = document.getElementById("introAudio");
    const links = document.getElementById("links");

    enterButton.addEventListener("click", async () => {
      try {
        introAudio.volume = 0;
        await introAudio.play();

        // Fade audio in
        let volume = 0;
        const fade = setInterval(() => {
          if (volume < 0.6) {
            volume += 0.02;
            introAudio.volume = Math.min(volume, 0.6);
          } else {
            clearInterval(fade);
          }
        }, 100);

        enterButton.style.display = "none";
        links.classList.add("visible");
      } catch (error) {
        console.error("Audio could not start:", error);
      }
    });
  </script>

</body>
</html>
